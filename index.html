<html> <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Build 0607:1353 -->
 
    <script type="module">
        import init, { xor_decode, GlimrRenderer, glimr_log } from './pkg/glimr.js';
        await init();
        window.glimr = { xor_decode, GlimrRenderer, glimr_log };
        window.renderer = new GlimrRenderer(
            document.getElementById('photo'),
            document.getElementById('backing')
        );
        window.init();
    </script>
    <script type="text/javascript" src="main.js"></script>
    <link rel="stylesheet" href="main.css">
</head>

<body>
    <div class="main-container">
        <div class="header" id="header_container">
        </div>
        <div class="gallery" id="lobjet_pane">
            <div id="loading"></div>
            <div id="stream-progress"><div id="stream-fill"></div></div>
            <canvas id='photo' oncontextmenu="return false;"> </canvas>
            <img id="logo-bottom" class="logo-watermark" src="sip.png" alt="">
            <img id="logo-left"   class="logo-watermark" src="sip.png" alt="">
        </div>

    </div>
    <div id="button-bar">
        <button id="btn-load"       class="action-btn">&#x1F5BC;</button>
        <button id="btn-fullscreen" class="action-btn">&#x26F6;</button>
        <button id="btn-download"   class="action-btn">&#x2B07;</button>
        <button id="btn-info"       class="action-btn">i</button>
    </div>
    <button id="btn-about" class="action-btn">&#x03B1;</button>
    <div id="info-overlay">
        <div id="info-box">
            <div id="info-title">
                <span id="info-filename"></span>
                <button id="info-close">&#x2715;</button>
            </div>
            <div id="info-body">
                <div id="info-content"></div>
            </div>
        </div>
    </div>
    <div id="about-overlay">
        <div id="about-box">
            <div id="about-title">
                <span id="about-heading">About</span>
                <button id="about-close">&#x2715;</button>
            </div>
            <div id="about-body">
                <div id="about-content"></div>
            </div>
        </div>
    </div>
    <canvas id='backing' hidden></canvas>
